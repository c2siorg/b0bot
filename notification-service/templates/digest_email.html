<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{SUBJECT}}</title>
  </head>
  <body style="margin:0;padding:0;background-color:#f5f0e8;font-family:Georgia,'Times New Roman',Times,serif;">

    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background-color:#f5f0e8;padding:32px 16px;">
      <tr>
        <td align="center">
          <table role="presentation" width="560" cellspacing="0" cellpadding="0" style="width:560px;max-width:100%;background-color:#fbf4ea;border:1px solid #e3d9cb;">

            <!-- Header -->
            <tr>
              <td style="padding:28px 32px 0 32px;">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0">
                  <tr>
                    <td style="border-top:3px solid #ff6817;font-size:0;line-height:0;">&nbsp;</td>
                  </tr>
                </table>
                <p style="margin:20px 0 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:13px;font-weight:600;color:#ff6817;letter-spacing:0.04em;text-transform:uppercase;">
                  B0Bot &middot; {{PERIOD_LABEL}}
                </p>
                <h1 style="margin:8px 0 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:26px;font-weight:700;line-height:1.3;color:#191919;">
                  {{HEADING}}
                </h1>
                <p style="margin:10px 0 0 0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:15px;line-height:1.6;color:#4a4a4a;">
                  {{SUBTITLE}}
                </p>
              </td>
            </tr>

            <!-- Articles -->
            <tr>
              <td style="padding:24px 32px 8px 32px;">
                {{ARTICLE_ROWS}}
              </td>
            </tr>

            <!-- CTA -->
            <tr>
              <td align="center" style="padding:8px 32px 32px 32px;">
                <a href="{{FRONTEND_URL}}"
                   style="display:inline-block;background-color:#ff6817;color:#ffffff;text-decoration:none;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:14px;font-weight:600;padding:12px 24px;">
                  Browse all news
                </a>
              </td>
            </tr>

            <!-- Footer -->
            <tr>
              <td style="padding:20px 32px 28px 32px;border-top:1px solid #e3d9cb;">
                <p style="margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;font-size:12px;line-height:1.6;color:#7a7a7a;">
                  You subscribed to B0Bot security news digests.<br/>
                  <a href="{{FRONTEND_URL}}" style="color:#ff6817;text-decoration:none;">{{SITE_LABEL}}</a>
                  &nbsp;&middot;&nbsp; C2SI 2026
                </p>
              </td>
            </tr>

          </table>
        </td>
      </tr>
    </table>

  </body>
</html>
